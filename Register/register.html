<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SaaS Maps | Criar Conta</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="../assets/css/auth.css">
</head>
<body>

<div class="auth-card">
    <div class="logo">
        <div class="avatar">
            <i class="fa-solid fa-user-plus"></i>
        </div>
        <h1>SaaS Maps</h1>
        <p>Crie sua conta para começar</p>
    </div>

    <form id="registerForm">
        <div class="input-box">
            <i class="fa-solid fa-user"></i>
            <input type="text" id="name" placeholder="Seu nome" required autocomplete="name">
        </div>

        <div class="input-box">
            <i class="fa-solid fa-envelope"></i>
            <input type="email" id="email" placeholder="Seu e-mail" required autocomplete="email" inputmode="email">
        </div>

        <div class="input-box">
            <i class="fa-solid fa-lock"></i>
            <input type="password" id="password" placeholder="Sua senha (mín. 6 caracteres)" required autocomplete="new-password" minlength="6">
            <button type="button" class="toggle-password" onclick="togglePasswordVisibility('password', this)" tabindex="-1" aria-label="Mostrar senha">
                <i class="fa-solid fa-eye"></i>
            </button>
        </div>

        <div class="input-box">
            <i class="fa-solid fa-lock"></i>
            <input type="password" id="confirmPassword" placeholder="Confirme sua senha" required autocomplete="new-password" minlength="6">
            <button type="button" class="toggle-password" onclick="togglePasswordVisibility('confirmPassword', this)" tabindex="-1" aria-label="Mostrar senha">
                <i class="fa-solid fa-eye"></i>
            </button>
        </div>

        <div style="margin: 10px 0 20px; display: flex; align-items: flex-start; gap: 8px;">
            <input type="checkbox" id="acceptTerms" required style="margin-top: 3px; accent-color:#6366f1;">
            <label for="acceptTerms" style="color: #ccc; font-size: .8rem; cursor: pointer;">
                Eu aceito os <a href="../termos.html" target="_blank" style="color: #8ec5fc;">Termos de Serviço</a> e a 
                <a href="../privacidade.html" target="_blank" style="color: #8ec5fc;">Política de Privacidade</a>
            </label>
        </div>

        <button type="submit" class="auth-btn" id="registerBtn">
            Criar conta
        </button>

        <div class="divider">OU</div>

        <button type="button" class="google-btn" id="googleRegisterBtn" onclick="registerWithGoogle()">
            <i class="fa-brands fa-google"></i> Criar conta com Google
        </button>

        <div class="auth-nav">
            Já possui conta?
            <a href="../Login/login.html">Entrar</a>
        </div>
    </form>
</div>

<!-- Strength bar -->
<div id="passwordStrength" style="display: none; margin-top: -12px; margin-bottom: 16px;">
    <div style="height: 4px; background: #333; border-radius: 2px; overflow: hidden;">
        <div id="strengthBar" style="height: 100%; width: 0; border-radius: 2px; transition: all .3s;"></div>
    </div>
    <span id="strengthLabel" style="font-size: .75rem; color: #aaa; margin-top: 4px; display: block;"></span>
</div>

<div class="auth-toast-container" id="authToastContainer"></div>

<script src="../assets/js/config.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../assets/js/i18n.js"></script>
<script src="../assets/js/error-handler.js"></script>
<script>
// ===== CONFIGURAÇÃO =====
let supabaseClient = null;

try {
    if (CONFIG.supabase.url && CONFIG.supabase.anonKey && typeof supabase !== 'undefined') {
        supabaseClient = supabase.createClient(CONFIG.supabase.url, CONFIG.supabase.anonKey);
    }
} catch (e) {
    console.warn('Supabase não disponível:', e);
}

// ===== TOAST =====
function showToast(message, type = 'info') {
    const container = document.getElementById('authToastContainer');
    const toast = document.createElement('div');
    toast.className = `auth-toast toast-${type}`;
    const icons = { success: 'fa-check-circle', error: 'fa-circle-xmark', warning: 'fa-triangle-exclamation', info: 'fa-circle-info' };
    toast.innerHTML = `<i class="fa-solid fa-${icons[type] || icons.info}"></i> ${message}`;
    container.appendChild(toast);
    setTimeout(() => { toast.style.opacity = '0'; toast.style.transition = 'opacity 0.3s'; setTimeout(() => toast.remove(), 300); }, 4000);
}

// ===== TOGGLE PASSWORD =====
function togglePasswordVisibility(inputId, btn) {
    const input = document.getElementById(inputId);
    const icon = btn.querySelector('i');
    if (input.type === 'password') {
        input.type = 'text';
        icon.className = 'fa-solid fa-eye-slash';
    } else {
        input.type = 'password';
        icon.className = 'fa-solid fa-eye';
    }
}

// ===== STRENGTH METER =====
document.getElementById('password').addEventListener('input', function() {
    const val = this.value;
    const strengthDiv = document.getElementById('passwordStrength');
    const bar = document.getElementById('strengthBar');
    const label = document.getElementById('strengthLabel');

    if (!val) {
        strengthDiv.style.display = 'none';
        return;
    }

    strengthDiv.style.display = 'block';
    let score = 0;
    if (val.length >= 6) score += 25;
    if (val.length >= 10) score += 15;
    if (/[A-Z]/.test(val)) score += 20;
    if (/[0-9]/.test(val)) score += 20;
    if (/[^A-Za-z0-9]/.test(val)) score += 20;

    let color, text;
    if (score < 30) { color = '#ef4444'; text = 'Fraca'; }
    else if (score < 50) { color = '#f59e0b'; text = 'Média'; }
    else if (score < 75) { color = '#22c55e'; text = 'Boa'; }
    else { color = '#6366f1'; text = 'Excelente'; }

    bar.style.width = score + '%';
    bar.style.background = color;
    label.textContent = 'Força da senha: ' + text;
    label.style.color = color;
});

// ===== VERIFICAR SESSÃO =====
window.addEventListener('load', async function() {
    if (supabaseClient) {
        try {
            const { data: { session } } = await supabaseClient.auth.getSession();
            if (session) {
                window.location.href = '../Dashboard/dashboard.html';
                return;
            }
        } catch (e) {
            console.warn('Erro ao verificar sessão:', e);
        }
    }
});

// ===== REGISTRO GOOGLE =====
async function registerWithGoogle() {
    const btn = document.getElementById('googleRegisterBtn');
    btn.disabled = true;
    btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Conectando...';

    if (supabaseClient) {
        try {
            const { error } = await supabaseClient.auth.signInWithOAuth({
                provider: 'google',
                options: {
                    redirectTo: window.location.origin + '/Dashboard/dashboard.html'
                }
            });
            if (error) throw error;
        } catch (err) {
            showToast('Erro ao conectar com Google. Verifique se o provedor Google está habilitado no Supabase.', 'error');
            btn.disabled = false;
            btn.innerHTML = '<i class="fa-brands fa-google"></i> Criar conta com Google';
        }
    } else {
        showToast('Supabase não configurado. Crie sua conta com e-mail e senha.', 'warning');
        btn.disabled = false;
        btn.innerHTML = '<i class="fa-brands fa-google"></i> Criar conta com Google';
    }
}

// ===== REGISTRO EMAIL/SENHA =====
document.getElementById('registerForm').addEventListener('submit', async function(e) {
    e.preventDefault();
    const name = document.getElementById('name').value.trim();
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    const confirmPassword = document.getElementById('confirmPassword').value;
    const acceptTerms = document.getElementById('acceptTerms').checked;
    const btn = document.getElementById('registerBtn');

    // Validações
    if (!name || !email || !password) {
        showToast('Preencha todos os campos', 'warning');
        return;
    }

    if (name.length < 2) {
        showToast('O nome deve ter pelo menos 2 caracteres', 'warning');
        return;
    }

    if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
        showToast('E-mail inválido', 'warning');
        return;
    }

    if (password.length < 6) {
        showToast('A senha deve ter no mínimo 6 caracteres', 'warning');
        return;
    }

    if (password !== confirmPassword) {
        showToast('As senhas não conferem', 'warning');
        return;
    }

    if (!acceptTerms) {
        showToast('Você precisa aceitar os Termos de Serviço', 'warning');
        return;
    }

    btn.disabled = true;
    btn.innerHTML = '<span class="btn-spinner"><i class="fa-solid fa-spinner"></i></span> Criando conta...';

    try {
        if (supabaseClient) {
            const { data, error } = await supabaseClient.auth.signUp({
                email: email,
                password: password,
                options: {
                    data: { name: name }
                }
            });
            if (error) throw error;

            sessionStorage.setItem('saas_user', name);
            sessionStorage.setItem('saas_email', email);
            sessionStorage.setItem('saas_user_id', data.user?.id);

            if (data.user && !data.session) {
                showToast('Conta criada! Verifique seu e-mail para confirmar o cadastro.', 'success');
                setTimeout(() => { window.location.href = '../Login/login.html'; }, 3000);
            } else {
                window.location.href = '../Dashboard/dashboard.html';
            }
        } else {
            sessionStorage.setItem('saas_user', name);
            sessionStorage.setItem('saas_email', email);
            window.location.href = '../Dashboard/dashboard.html';
        }
    } catch (err) {
        const msg = err.message || '';
        if (msg.includes('already registered')) {
            showToast('Este e-mail já está cadastrado', 'error');
        } else if (msg.includes('Password should be at least 6 characters')) {
            showToast('A senha deve ter no mínimo 6 caracteres', 'warning');
        } else {
            showToast('Erro ao criar conta: ' + (err.message || 'Tente novamente'), 'error');
        }
    } finally {
        btn.disabled = false;
        btn.innerHTML = 'Criar conta';
    }
});

// ===== KEYBOARD SHORTCUTS =====
document.addEventListener('keydown', function(e) {
    if (e.ctrlKey && e.key === 'Enter') {
        document.getElementById('registerForm').requestSubmit();
    }
});
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SaaS Maps | Login</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="../assets/css/auth.css">
</head>
<body>

<div class="auth-card">
    <div class="logo">
        <div class="avatar">
            <i class="fa-solid fa-user"></i>
        </div>
        <h1>SaaS Maps</h1>
        <p>Encontre empresas sem presença digital</p>
    </div>

    <form id="loginForm">
        <div class="input-box">
            <i class="fa-solid fa-envelope"></i>
            <input type="email" id="email" placeholder="Seu e-mail" required autocomplete="email" inputmode="email">
        </div>

        <div class="input-box">
            <i class="fa-solid fa-lock"></i>
            <input type="password" id="password" placeholder="Sua senha" required autocomplete="current-password" minlength="6">
            <button type="button" class="toggle-password" onclick="togglePasswordVisibility('password', this)" tabindex="-1" aria-label="Mostrar senha">
                <i class="fa-solid fa-eye"></i>
            </button>
        </div>

        <div class="options">
            <label>
                <input type="checkbox" id="remember">
                Lembrar-me
            </label>
            <a href="#" id="forgotPassword">Esqueci minha senha</a>
        </div>

        <button type="submit" class="auth-btn" id="loginBtn">
            Entrar
        </button>

        <div class="divider">OU</div>

        <button type="button" class="google-btn" id="googleLoginBtn" onclick="loginWithGoogle()">
            <i class="fa-brands fa-google"></i> Entrar com Google
        </button>

        <div class="auth-nav">
            Não possui conta?
            <a href="../Register/register.html">Criar conta</a>
        </div>
    </form>
</div>

<div class="auth-toast-container" id="authToastContainer"></div>

<script src="../assets/js/config.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../assets/js/i18n.js"></script>
<script src="../assets/js/error-handler.js"></script>
<script>
// ===== CONFIGURAÇÃO =====
let supabaseClient = null;

// Inicializar Supabase
try {
    if (CONFIG.supabase.url && CONFIG.supabase.anonKey && typeof supabase !== 'undefined') {
        supabaseClient = supabase.createClient(CONFIG.supabase.url, CONFIG.supabase.anonKey);
    }
} catch (e) {
    console.warn('Supabase não disponível:', e);
}

// ===== TOAST =====
function showToast(message, type = 'info') {
    const container = document.getElementById('authToastContainer');
    const toast = document.createElement('div');
    toast.className = `auth-toast toast-${type}`;
    const icons = { success: 'fa-check-circle', error: 'fa-circle-xmark', warning: 'fa-triangle-exclamation', info: 'fa-circle-info' };
    toast.innerHTML = `<i class="fa-solid fa-${icons[type] || icons.info}"></i> ${message}`;
    container.appendChild(toast);
    setTimeout(() => { toast.style.opacity = '0'; toast.style.transition = 'opacity 0.3s'; setTimeout(() => toast.remove(), 300); }, 4000);
}

// ===== TOGGLE PASSWORD =====
function togglePasswordVisibility(inputId, btn) {
    const input = document.getElementById(inputId);
    const icon = btn.querySelector('i');
    if (input.type === 'password') {
        input.type = 'text';
        icon.className = 'fa-solid fa-eye-slash';
    } else {
        input.type = 'password';
        icon.className = 'fa-solid fa-eye';
    }
}

// ===== VERIFICAR SESSÃO =====
window.addEventListener('load', async function() {
    if (supabaseClient) {
        try {
            const { data: { session } } = await supabaseClient.auth.getSession();
            if (session) {
                window.location.href = '../Dashboard/dashboard.html';
                return;
            }
        } catch (e) {
            console.warn('Erro ao verificar sessão:', e);
        }
    }
});

// ===== LOGIN GOOGLE =====
async function loginWithGoogle() {
    const btn = document.getElementById('googleLoginBtn');
    btn.disabled = true;
    btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Conectando...';

    if (supabaseClient) {
        try {
            const { error } = await supabaseClient.auth.signInWithOAuth({
                provider: 'google',
                options: {
                    redirectTo: window.location.origin + '/Dashboard/dashboard.html'
                }
            });
            if (error) throw error;
        } catch (err) {
            showToast('Erro ao conectar com Google. Verifique se o provedor Google está habilitado no Supabase.', 'error');
            btn.disabled = false;
            btn.innerHTML = '<i class="fa-brands fa-google"></i> Entrar com Google';
        }
    } else {
        showToast('Supabase não configurado. Faça login com e-mail e senha.', 'warning');
        btn.disabled = false;
        btn.innerHTML = '<i class="fa-brands fa-google"></i> Entrar com Google';
    }
}

// ===== LOGIN EMAIL/SENHA =====
document.getElementById('loginForm').addEventListener('submit', async function(e) {
    e.preventDefault();
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    const btn = document.getElementById('loginBtn');
    const remember = document.getElementById('remember').checked;

    if (!email || !password) {
        showToast('Preencha e-mail e senha', 'warning');
        return;
    }

    if (password.length < 6) {
        showToast('A senha deve ter no mínimo 6 caracteres', 'warning');
        return;
    }

    btn.disabled = true;
    btn.innerHTML = '<span class="btn-spinner"><i class="fa-solid fa-spinner"></i></span> Entrando...';

    try {
        if (supabaseClient) {
            const { data, error } = await supabaseClient.auth.signInWithPassword({
                email: email,
                password: password
            });
            if (error) throw error;

            // Salvar sessão
            sessionStorage.setItem('saas_user', data.user?.user_metadata?.name || email.split('@')[0]);
            sessionStorage.setItem('saas_email', email);
            sessionStorage.setItem('saas_user_id', data.user?.id);

            // Se "Lembrar-me" estiver marcado, salvar no localStorage
            if (remember) {
                localStorage.setItem('saas_remember_email', email);
            } else {
                localStorage.removeItem('saas_remember_email');
            }

            window.location.href = '../Dashboard/dashboard.html';
        } else {
            // Fallback
            sessionStorage.setItem('saas_user', email.split('@')[0]);
            sessionStorage.setItem('saas_email', email);
            if (remember) localStorage.setItem('saas_remember_email', email);
            window.location.href = '../Dashboard/dashboard.html';
        }
    } catch (err) {
        const msg = err.message || '';
        if (msg.includes('Invalid login credentials')) {
            showToast('E-mail ou senha inválidos', 'error');
        } else if (msg.includes('Email not confirmed')) {
            showToast('Confirme seu e-mail antes de fazer login', 'warning');
        } else {
            showToast('Erro ao fazer login: ' + (err.message || 'Tente novamente'), 'error');
        }
    } finally {
        btn.disabled = false;
        btn.innerHTML = 'Entrar';
    }
});

// ===== PREENCHER EMAIL SALVO =====
document.addEventListener('DOMContentLoaded', function() {
    const savedEmail = localStorage.getItem('saas_remember_email');
    if (savedEmail) {
        document.getElementById('email').value = savedEmail;
        document.getElementById('remember').checked = true;
    }
});

// ===== KEYBOARD SHORTCUTS =====
document.addEventListener('keydown', function(e) {
    // Ctrl+Enter para submeter
    if (e.ctrlKey && e.key === 'Enter') {
        document.getElementById('loginForm').requestSubmit();
    }
});
</script>

</body>
</html>

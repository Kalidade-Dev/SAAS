<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Saas Maps | Login</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:radial-gradient(circle at top, rgba(255,255,255,.05), transparent 25%),
                linear-gradient(180deg, #070707 0%, #020202 100%);
    color:#fff;
    overflow:hidden;
    position:relative;
}

/* Fundo */

body::before,
body::after{
    content:"";
    position:absolute;
    width:0;
    height:0;
    opacity:0;
}

/* Card */

.login-card{
    position:relative;
    width:430px;
    padding:40px;
    border-radius:28px;

    background:linear-gradient(180deg, rgba(20,20,20,.96), rgba(0,0,0,.9));

    backdrop-filter:blur(10px);

    border:1px solid rgba(255,255,255,.08);

    box-shadow:
    0 25px 50px rgba(0,0,0,.6);

    z-index:2;
}

/* Logo */

.logo{
    text-align:center;
    margin-bottom:35px;
}

.avatar{
    width:95px;
    height:95px;
    margin:auto;
    border-radius:50%;

    background:
    linear-gradient(
        135deg,
        #161616,
        #2e3636
    );

    display:flex;
    justify-content:center;
    align-items:center;

    color:#fff;
    font-size:38px;

    box-shadow:
    inset 0 0 0 1px rgba(255,255,255,.08),
    0 0 25px rgba(255,255,255,.06);

    margin-bottom:18px;
}

.logo p{
    color:#d1d5db;
    margin-top:5px;
    font-size:.9rem;
}

/* Inputs */

.input-box{
    width:100%;
    display:flex;
    align-items:center;

    background:#111;

    border:1px solid #333;

    border-radius:14px;

    margin-bottom:16px;

    padding:0 15px;
}

.input-box i{
    color:#ddd;
}

.input-box input{
    width:100%;
    padding:16px;
    border:none;
    outline:none;
    background:none;
    color:#fff;
    font-size:.95rem;
}

.input-box input::placeholder{
    color:#aaa;
}

/* Opções */

.options{
    display:flex;
    justify-content:space-between;
    align-items:center;

    margin:18px 0 25px;
}

.options label{
    color:#eee;
    font-size:.85rem;
}

.options a{
    color:#8ec5fc;
    text-decoration:none;
    font-size:.85rem;
}

/* Botão */

.login-btn{
    width:100%;
    border:none;
    cursor:pointer;

    padding:15px;

    border-radius:14px;

    background:#111;

    color:#fff;

    font-size:1rem;
    font-weight:600;

    transition:.3s;
}

.login-btn:hover{
    transform:translateY(-2px);
    box-shadow:0 10px 25px rgba(255,255,255,.15);
}

/* Linha */

.divider{
    margin:25px 0;
    text-align:center;
    color:#ccc;
    position:relative;
}

.divider::before,
.divider::after{
    content:"";
    position:absolute;
    width:40%;
    height:1px;
    background:#333;
    top:50%;
}

.divider::before{
    left:0;
}

.divider::after{
    right:0;
}

/* Cadastro */

.register{
    text-align:center;
    color:#eee;
    font-size:.9rem;
}

.register a{
    color:#8ec5fc;
    text-decoration:none;
    font-weight:600;
}

#googleBtn{
    display:flex;
    justify-content:center;
    margin-bottom:20px;
}

/* Responsivo */

@media(max-width:500px){

    .login-card{
        width:90%;
        padding:30px;
    }

}

</style>
</head>
<body>

<div class="login-card">

    <div class="logo">

        <div class="avatar">
            <i class="fa-solid fa-user"></i>
        </div>

        <h1>Saas Maps</h1>
        
        <p>Encontre empresas sem presença digital</p>

    </div>

    <form id="loginForm">

        <div class="input-box">
            <i class="fa-solid fa-envelope"></i>
            <input type="email" id="email" placeholder="Seu e-mail" required>
        </div>

        <div class="input-box">
            <i class="fa-solid fa-lock"></i>
            <input type="password" id="password" placeholder="Sua senha" required>
        </div>

        <div class="options">
            <label>
                <input type="checkbox" id="remember">
                Lembrar-me
            </label>

            <a href="#">Esqueci minha senha</a>
        </div>

        <button type="submit" class="login-btn">
            Entrar
        </button>

        <div class="divider">
            OU
        </div>

        <div id="googleBtn"></div>

        <div class="register">
            Não possui conta?
            <a href="../Register/register.html">Criar conta</a>
        </div>

    </form>

</div>

<script src="../assets/js/config.js"></script>
<!-- Supabase JS SDK v2 -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://accounts.google.com/gsi/client" async defer></script>
<script>
let supabaseClient = null;

// Inicializar Supabase com tratamento de erro
if (CONFIG.supabase.url && CONFIG.supabase.anonKey) {
    try {
        supabaseClient = supabase.createClient(CONFIG.supabase.url, CONFIG.supabase.anonKey);
    } catch (e) {
        console.warn('Erro ao inicializar Supabase:', e);
        supabaseClient = null;
    }
}

// Verificar se já está logado
window.addEventListener('load', async function() {
    if (supabaseClient) {
        try {
            const { data: { session } } = await supabaseClient.auth.getSession();
            if (session) {
                window.location.href = '../Dashboard/dashboard.html';
                return;
            }
        } catch (e) {
            console.warn('Erro ao verificar sessão:', e);
        }
    }
    initGoogle();
});

// Login com Google via Supabase
function handleGoogleLogin(response) {
    if (supabaseClient) {
        supabaseClient.auth.signInWithOAuth({
            provider: 'google',
            options: {
                redirectTo: window.location.origin + '/Dashboard/dashboard.html'
            }
        });
    } else {
        // Fallback: usar dados do Google diretamente
        const payload = JSON.parse(atob(response.credential.split('.')[1]));
        sessionStorage.setItem('saas_user', payload.name || payload.email.split('@')[0]);
        sessionStorage.setItem('saas_email', payload.email);
        window.location.href = '../Dashboard/dashboard.html';
    }
}

// Login com email/senha
document.getElementById('loginForm').addEventListener('submit', async function(e) {
    e.preventDefault();
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    const btn = this.querySelector('.login-btn');

    if (!email || !password) {
        alert('Preencha e-mail e senha');
        return;
    }

    btn.disabled = true;
    btn.textContent = 'Entrando...';

    try {
        if (supabaseClient) {
            const { data, error } = await supabaseClient.auth.signInWithPassword({
                email: email,
                password: password
            });
            if (error) throw error;

            sessionStorage.setItem('saas_user', data.user?.user_metadata?.name || email.split('@')[0]);
            sessionStorage.setItem('saas_email', email);
            sessionStorage.setItem('saas_user_id', data.user?.id);

            window.location.href = '../Dashboard/dashboard.html';
        } else {
            // Sem Supabase configurado ou inacessível, login direto
            sessionStorage.setItem('saas_user', email.split('@')[0]);
            sessionStorage.setItem('saas_email', email);
            window.location.href = '../Dashboard/dashboard.html';
        }
    } catch (err) {
        console.warn('Erro no login Supabase:', err);
        // Fallback: login direto sem Supabase
        sessionStorage.setItem('saas_user', email.split('@')[0]);
        sessionStorage.setItem('saas_email', email);
        window.location.href = '../Dashboard/dashboard.html';
    } finally {
        btn.disabled = false;
        btn.textContent = 'Entrar';
    }
});

// Botão Google
function initGoogle() {
    if (!CONFIG.googleAuth?.clientId) return;

    const init = () => {
        google.accounts.id.initialize({
            client_id: CONFIG.googleAuth.clientId,
            callback: handleGoogleLogin
        });
        google.accounts.id.renderButton(document.getElementById('googleBtn'), {
            theme: 'filled_black',
            size: 'large',
            width: 350,
            text: 'signin_with',
            locale: 'pt-BR'
        });
    };

    if (window.google?.accounts?.id) init();
    else {
        const script = document.querySelector('script[src*="gsi/client"]');
        if (script) script.addEventListener('load', init);
    }
}
</script>

</body>
</html>

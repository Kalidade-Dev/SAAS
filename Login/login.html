image.png<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Saas Maps | Login</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:radial-gradient(circle at top, rgba(255,255,255,.05), transparent 25%),
                linear-gradient(180deg, #070707 0%, #020202 100%);
    color:#fff;
    overflow:hidden;
    position:relative;
}

/* Fundo */

body::before,
body::after{
    content:"";
    position:absolute;
    width:0;
    height:0;
    opacity:0;
}

/* Card */

.login-card{
    position:relative;
    width:430px;
    padding:40px;
    border-radius:28px;

    background:linear-gradient(180deg, rgba(20,20,20,.96), rgba(0,0,0,.9));

    backdrop-filter:blur(10px);

    border:1px solid rgba(255,255,255,.08);

    box-shadow:
    0 25px 50px rgba(0,0,0,.6);

    z-index:2;
}

/* Logo */

.logo{
    text-align:center;
    margin-bottom:35px;
}

.avatar{
    width:95px;
    height:95px;
    margin:auto;
    border-radius:50%;

    background:
    linear-gradient(
        135deg,
        #161616,
        #2e3636
    );

    display:flex;
    justify-content:center;
    align-items:center;

    color:#fff;
    font-size:38px;

    box-shadow:
    inset 0 0 0 1px rgba(255,255,255,.08),
    0 0 25px rgba(255,255,255,.06);

    margin-bottom:18px;
}

.logo p{
    color:#d1d5db;
    margin-top:5px;
    font-size:.9rem;
}

/* Inputs */

.input-box{
    width:100%;
    display:flex;
    align-items:center;

    background:#111;

    border:1px solid #333;

    border-radius:14px;

    margin-bottom:16px;

    padding:0 15px;
}

.input-box i{
    color:#ddd;
}

.input-box input{
    width:100%;
    padding:16px;
    border:none;
    outline:none;
    background:none;
    color:#fff;
    font-size:.95rem;
}

.input-box input::placeholder{
    color:#aaa;
}

/* Opções */

.options{
    display:flex;
    justify-content:space-between;
    align-items:center;

    margin:18px 0 25px;
}

.options label{
    color:#eee;
    font-size:.85rem;
}

.options a{
    color:#8ec5fc;
    text-decoration:none;
    font-size:.85rem;
}

/* Botão */

.login-btn{
    width:100%;
    border:none;
    cursor:pointer;

    padding:15px;

    border-radius:14px;

    background:#111;

    color:#fff;

    font-size:1rem;
    font-weight:600;

    transition:.3s;
}

.login-btn:hover{
    transform:translateY(-2px);
    box-shadow:0 10px 25px rgba(255,255,255,.15);
}

/* Linha */

.divider{
    margin:25px 0;
    text-align:center;
    color:#ccc;
    position:relative;
}

.divider::before,
.divider::after{
    content:"";
    position:absolute;
    width:40%;
    height:1px;
    background:#333;
    top:50%;
}

.divider::before{
    left:0;
}

.divider::after{
    right:0;
}

/* Cadastro */

.register{
    text-align:center;
    color:#eee;
    font-size:.9rem;
}

.register a{
    color:#8ec5fc;
    text-decoration:none;
    font-weight:600;
}

#googleBtn{
    display:flex;
    justify-content:center;
    margin-bottom:20px;
}

/* Responsivo */

@media(max-width:500px){

    .login-card{
        width:90%;
        padding:30px;
    }

}

</style>
</head>
<body>

<div class="login-card">

    <div class="logo">

        <div class="avatar">
            <i class="fa-solid fa-user"></i>
        </div>

        <h1>Saas Maps</h1>
        
        <p>Encontre empresas sem presença digital</p>

    </div>

    <form id="loginForm">

        <div class="input-box">
            <i class="fa-solid fa-envelope"></i>
            <input type="email" id="email" placeholder="Seu e-mail" required>
        </div>

        <div class="input-box">
            <i class="fa-solid fa-lock"></i>
            <input type="password" id="password" placeholder="Sua senha" required>
        </div>

        <div class="options">
            <label>
                <input type="checkbox" id="remember">
                Lembrar-me
            </label>

            <a href="#">Esqueci minha senha</a>
        </div>

        <button type="submit" class="login-btn">
            Entrar
        </button>

        <div class="divider">
            OU
        </div>

        <div id="googleBtn"></div>

        <div class="register">
            Não possui conta?
            <a href="../Register/register.html">Criar conta</a>
        </div>

    </form>

</div>

<script src="../assets/js/config.js"></script>
<script src="https://accounts.google.com/gsi/client" async defer></script>
<script>
function handleGoogleLogin(response) {
    const payload = JSON.parse(atob(response.credential.split('.')[1]));
    sessionStorage.setItem('saas_user', payload.name || payload.email.split('@')[0]);
    sessionStorage.setItem('saas_email', payload.email);
    window.location.href = '../Dashboard/dashboard.html';
}

document.getElementById('loginForm').addEventListener('submit', function(e) {
    e.preventDefault();
    window.location.href = '../Dashboard/dashboard.html';
});

window.addEventListener('load', function() {
    if (!CONFIG.googleAuth?.clientId) return;

    const init = () => {
        google.accounts.id.initialize({
            client_id: CONFIG.googleAuth.clientId,
            callback: handleGoogleLogin
        });
        google.accounts.id.renderButton(document.getElementById('googleBtn'), {
            theme: 'filled_black',
            size: 'large',
            width: 350,
            text: 'signin_with',
            locale: 'pt-BR'
        });
    };

    if (window.google?.accounts?.id) init();
    else document.querySelector('script[src*="gsi/client"]').addEventListener('load', init);
});
</script>

</body>
</html>
